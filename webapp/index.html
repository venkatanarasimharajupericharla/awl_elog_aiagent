<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWL ELog AI Agent</title>

    <!-- OpenUI5 bootstrap from the public CDN (pinned version, Horizon theme) -->
    <script
        id="sap-ui-bootstrap"
        src="https://sdk.openui5.org/1.136.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m,sap.ui.core,sap.ui.layout,sap.f"
        data-sap-ui-resourceroots='{ "joule": "./" }'
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted"
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport">
    </script>
</head>
<body class="sapUiBody" style="height:100%;margin:0">
    <div
        data-sap-ui-component
        data-name="joule"
        data-id="container"
        data-settings='{ "id": "joule" }'
        data-height="100%"
        style="height:100%">
    </div>
</body>
</html>
